<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    <!-- Subtle Drop Shadow for the Icon -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Background Rounded Rect -->
  <rect width="180" height="180" rx="42" fill="url(#bgGrad)" />

  <!-- UniRent Logo Icon -->
  <g filter="url(#dropShadow)">
    <!-- Graduation Cap (Uni) -->
    <!-- Cap Diamond -->
    <polygon points="60,42 82,50 60,58 38,50" fill="#ffffff" />
    <!-- Cap Base / Underneath -->
    <path d="M 47,53 C 47,58 73,58 73,53" stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" />
    <!-- Tassel -->
    <path d="M 52,49 L 43,54 L 43,62" stroke="#e0e7ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <circle cx="43" cy="62" r="1.5" fill="#e0e7ff" />

    <!-- U-R Monogram (Rent) -->
    <!-- Stylized U (shares right leg with R) -->
    <path d="M 60,78 L 60,110 C 60,122 90,122 90,110 L 90,78" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    
    <!-- R Loop and Leg -->
    <path d="M 90,78 C 112,78 122,88 122,96 C 122,104 112,110 90,110" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
    <path d="M 104,107 L 122,128" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>
</svg>